function ContractsPage({ projects, employees, onSelectProject, onAddProject, onDeleteProject }) {
  const [search, setSearch] = useState('');
  const [phaseFilter, setPhaseFilter] = useState('all');
  const [showAdd, setShowAdd] = useState(false);
  const [sortKey, setSortKey] = useState('name');
  const [sortDir, setSortDir] = useState('asc');

  const filtered = projects.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || p.client.toLowerCase().includes(search.toLowerCase());
    const matchPhase = phaseFilter === 'all' || p.phase === phaseFilter;
    return matchSearch && matchPhase;
  });

  const sorted = sortProjects(filtered, sortKey, sortDir);

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">CONTRACTS</div>
          <div className="page-subtitle">{projects.length} total · {projects.filter(p => p.phase !== 'closed').length} active</div>
        </div>
        <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ New Contract</button>
      </div>
      <div className="content">
        <div className="table-wrap">
          <div className="table-toolbar">
            <input className="search-input" placeholder="Search projects or clients..." value={search} onChange={e => setSearch(e.target.value)} />
            <select className="form-select" style={{ width: 'auto' }} value={phaseFilter} onChange={e => setPhaseFilter(e.target.value)}>
              <option value="all">All Phases</option>
              {PHASES.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}
            </select>
            <SortControl value={sortKey} dir={sortDir} options={SORT_OPTIONS_CONTRACTS} onChange={setSortKey} onToggle={() => setSortDir(d => d === 'asc' ? 'desc' : 'asc')} />
          </div>
          <table>
            <thead>
              <tr><th>Project</th><th>Phase</th><th>Contract Value</th><th>Change Orders</th><th>Start Date</th><th></th></tr>
            </thead>
            <tbody>
              {sorted.length === 0 && (
                <tr><td colSpan={5}><div className="empty-state"><div className="empty-state-icon">📋</div><div className="empty-state-text">No contracts found</div><div className="empty-state-sub">Try adjusting your search or filter</div></div></td></tr>
              )}
              {sorted.map(p => {
                const approvedCOs = p.changeOrders.filter(co => co.approved).reduce((s, co) => s + co.amount, 0);
                return (
                  <tr key={p.id} onClick={() => onSelectProject(p)} style={{ cursor: 'pointer' }}>
                    <td>
                      <div className="td-project">{p.name}</div>
                      <div className="td-client">{p.client}</div>
                    </td>
                    <td><PhaseBadge phase={p.phase} /></td>
                    <td className="td-mono">{fmt(p.contractValue)}</td>
                    <td>
                      {p.changeOrders.length === 0
                        ? <span style={{ color: 'var(--text3)', fontSize: 12 }}>—</span>
                        : <span className="tag tag-orange">{p.changeOrders.length} CO{p.changeOrders.length > 1 ? 's' : ''} · {fmt(approvedCOs)} approved</span>}
                    </td>
                    <td style={{ color: 'var(--text3)', fontFamily: 'DM Mono', fontSize: 12 }}>{p.startDate || '—'}</td>
                    <td onClick={e => e.stopPropagation()}>
                      <button className="btn btn-ghost btn-sm" style={{ color: 'var(--red)' }} onClick={() => { if (window.confirm(`Delete ${p.name}?`)) onDeleteProject(p.id); }}>Delete</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {showAdd && <AddProjectModal onClose={() => setShowAdd(false)} onAdd={p => { onAddProject(p); setShowAdd(false); }} employees={employees} />}
    </div>
  );
}

const SUGGESTIONS = [
  'Add a new contract for Elmwood Apartments, $118,000, membrane phase',
  'Log 14 hours for Marcus Webb on Riverside Commons metal phase',
  'Create an invoice for Riverside Commons: deposit $50,000',

function AIChatSidebar({ projects, employees, onAddProject, onUpdateProject, onAddEmployee, onRefresh }) {
  const [messages, setMessages] = useState([
    {
      role: 'assistant',
      content: "Hey — I'm your Apex AI assistant. Tell me what you need and I'll update contracts, log expenses, create and update invoices, manage change orders, or pull up a P&L summary.\n\nTry one of the suggestions below to get started."
    }
  ]);
  const [input, setInput] = useState('');
  const [thinking, setThinking] = useState(false);
  const [showSuggestions, setShowSuggestions] = useState(true);
  const [connected, setConnected] = useState(null); // null=checking, true=ok, false=down
  const [aiInfo, setAiInfo] = useState(null);       // { provider, model } from /api/health
  const messagesEndRef = React.useRef(null);
  const textareaRef = React.useRef(null);
  const [open, setOpen] = useState(true);
  const [minimized, setMinimized] = useState(false);

  // Check connectivity on mount and every 30s
  React.useEffect(() => {
    const check = async () => {
      try {
        const res = await fetch('/api/health', { signal: AbortSignal.timeout(4000) });
        setConnected(res.ok);
        if (res.ok) { try { setAiInfo(await res.json()); } catch {} }
      } catch {
        setConnected(false);
      }
    };
    check();
    const interval = setInterval(check, 30000);
    return () => clearInterval(interval);
  }, []);

  React.useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, thinking]);

  // Auto-resize textarea
  const handleInputChange = (e) => {
    setInput(e.target.value);
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input);
    }
  };

  const buildContext = () => {
    const empMap = Object.fromEntries(employees.map(e => [e.id, e]));
    const projectSummaries = projects.map(p => {
      const calc = calcProject(p, employees);
      return {
        id: p.id,
        name: p.name,
        client: p.client,
        contractValue: p.contractValue,
        phase: p.phase,
        startDate: p.startDate,
        notes: p.notes,
        changeOrders: p.changeOrders,
        retainageHeld: p.retainageHeld,
        retainageReleased: p.retainageReleased,
        totalMaterials: calc.totalMaterials,
        totalLabor: calc.totalLabor,
        totalRevenue: calc.totalRevenue,
        totalCost: calc.totalCost,
        grossProfit: calc.gross,
        marginPct: parseFloat(calc.margin.toFixed(1)),
        phases: Object.fromEntries(
          Object.entries(p.phases).map(([ph, data]) => [ph, {
            materialCount: data.materials.length,
            materialTotal: data.materials.reduce((s, m) => s + m.amount, 0),
            laborEntries: data.labor.map(l => ({
              employee: empMap[l.employeeId]?.name,
              hours: l.hours,
              cost: (empMap[l.employeeId]?.rate || 0) * l.hours
            }))
          }])
        )
      };
    });
    return { projects: projectSummaries, employees };
  };

  const executeAction = (action) => {
    try {
      if (action.type === 'create_project') {
        const emptyPhases = Object.fromEntries(PHASES.map(p => [p.id, { materials: [], labor: [] }]));
        onAddProject({
          id: 'p' + Date.now(),
          name: action.name,
          client: action.client || '',
          contractValue: action.contractValue || 0,
          startDate: action.startDate || '',
          phase: action.phase || 'membrane',
          notes: action.notes || '',
          changeOrders: [],
          retainageHeld: 0,
          retainageReleased: 0,
          phases: emptyPhases,
        });
        return `✓ Created contract: **${action.name}**`;
      }

      if (action.type === 'update_project_phase') {
        const p = projects.find(p => p.name.toLowerCase().includes(action.projectName?.toLowerCase()) || p.id === action.projectId);
        if (!p) return `✗ Could not find project matching "${action.projectName}"`;
        onUpdateProject({ ...p, phase: action.phase });
        return `✓ Moved **${p.name}** to **${action.phase}** phase`;
      }

      if (action.type === 'add_material') {
        const p = projects.find(p => p.name.toLowerCase().includes(action.projectName?.toLowerCase()) || p.id === action.projectId);
        if (!p) return `✗ Could not find project matching "${action.projectName}"`;
        const phase = action.phase || p.phase;
        const updated = { ...p, phases: { ...p.phases, [phase]: { ...p.phases[phase], materials: [...p.phases[phase].materials, { id: 'm' + Date.now(), desc: action.description, vendor: action.vendor || '', amount: action.amount || 0 }] } } };
        onUpdateProject(updated);
        return `✓ Added material **${action.description}** ($${action.amount?.toLocaleString()}) to **${p.name}** — ${phase} phase`;
      }

      if (action.type === 'add_labor') {
        const p = projects.find(p => p.name.toLowerCase().includes(action.projectName?.toLowerCase()) || p.id === action.projectId);
        if (!p) return `✗ Could not find project matching "${action.projectName}"`;
        const emp = employees.find(e => e.name.toLowerCase().includes(action.employeeName?.toLowerCase()) || e.id === action.employeeId);
        if (!emp) return `✗ Could not find employee matching "${action.employeeName}"`;
        const phase = action.phase || p.phase;
        const updated = { ...p, phases: { ...p.phases, [phase]: { ...p.phases[phase], labor: [...p.phases[phase].labor, { id: 'l' + Date.now(), employeeId: emp.id, hours: action.hours || 0, notes: action.notes || '' }] } } };
        onUpdateProject(updated);
        return `✓ Logged **${action.hours}h** for **${emp.name}** on **${p.name}** — ${phase} phase ($${(emp.rate * action.hours).toLocaleString()})`;
      }

      if (action.type === 'add_change_order') {
        const p = projects.find(p => p.name.toLowerCase().includes(action.projectName?.toLowerCase()) || p.id === action.projectId);
        if (!p) return `✗ Could not find project matching "${action.projectName}"`;
        const updated = { ...p, changeOrders: [...p.changeOrders, { id: 'co' + Date.now(), description: action.description, amount: action.amount || 0, approved: action.approved || false }] };
        onUpdateProject(updated);
        return `✓ Added change order **"${action.description}"** ($${action.amount?.toLocaleString()}) to **${p.name}**`;
      }

      if (action.type === 'add_employee') {
        onAddEmployee({ id: 'e' + Date.now(), name: action.name, role: action.role || '', rate: action.rate || 0 });
        return `✓ Added employee **${action.name}** at $${action.rate}/hr`;
      }

      if (action.type === 'delete_project') {
        const p = projects.find(p => p.name.toLowerCase().includes(action.projectName?.toLowerCase()) || p.id === action.projectId);
        if (!p) return `✗ Could not find project matching "${action.projectName}"`;
        onDeleteProject(p.id);
        return `✓ Deleted contract **${p.name}**`;
      }

      return null;
    } catch (err) {
      return `✗ Action failed: ${err.message}`;
    }
  };

  const sendMessage = async (text) => {
    if (!text.trim() || thinking) return;
    setShowSuggestions(false);
    const userMsg = { role: 'user', content: text.trim() };
    setMessages(m => [...m, userMsg]);
    setInput('');
    if (textareaRef.current) { textareaRef.current.style.height = 'auto'; }
    setThinking(true);

    const context = buildContext();
    const systemPrompt = `You are an AI assistant for Apex Roofing's contract management system. You help the user manage roofing contracts, track expenses, and understand project profitability.

Current data:
${JSON.stringify(context, null, 2)}

You can perform actions by including a JSON block in your response. ALWAYS wrap action JSON in <action> tags like this:
<action>{"type": "create_project", "name": "...", "client": "...", "contractValue": 0, "phase": "membrane"}</action>

Available action types and their fields:
- create_project: name (required), client, contractValue, startDate (YYYY-MM-DD), phase (membrane/metal/qc/change/retainage/closed), notes
- update_project_phase: projectName (required), phase (required)
- add_material: projectName (required), description (required), amount (required), vendor, phase
- add_labor: projectName (required), employeeName (required), hours (required), phase, notes
- add_change_order: projectName (required), description (required), amount (required), approved (boolean)
- add_employee: name (required), role, rate (hourly dollar amount)
- delete_project: projectName (required)

Rules:
- Only include ONE <action> block per response if an action is needed
- If no action is needed (e.g. answering a question), respond conversationally with no <action> block
- Be concise. After performing an action, confirm it briefly and offer a follow-up if useful
- For profit/loss questions, calculate from the data above and present clearly
- Phases in order: membrane → metal → qc → change → retainage → closed`;

    const conversationHistory = [
      ...messages.slice(-8).map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content })),
      { role: 'user', content: text.trim() }
    ];

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text.trim(),
          history: messages.slice(-10).filter(m => m.role === 'user' || m.role === 'assistant').map(m => ({ role: m.role, content: m.content })),
          projectId: null, // global search across all project docs
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || `Server error ${res.status}`);
      }

      const data = await res.json();

      setMessages(m => {
        const next = [...m];
        if (data.text) next.push({ role: 'assistant', content: data.text });
        if (data.actionResult) {
          next.push({
            role: 'system',
            content: `${data.actionResult.ok ? '✓' : '✗'} ${data.actionResult.message}`
          });
          if (data.actionResult.ok && onRefresh) onRefresh();
        }
        if (data.ragUsed) {
          next.push({ role: 'rag', content: '📄 Answer includes context from uploaded documents' });
        }
        return next;
      });

    } catch (err) {
      // Surface the real error instead of a misleading demo reply.
      const isNetwork = err.name === 'TypeError' || /fetch|network/i.test(err.message || '');
      setMessages(m => [...m, { role: 'error', content: isNetwork
        ? `⚠ Can't reach the AI backend. Check that the app server and Ollama (or your configured provider) are running.`
        : `⚠ ${err.message}` }]);
      if (isNetwork) setConnected(false);
    } finally {
      setThinking(false);
    }
  };

  const getDemoReply = (text, ctx) => {
    const t = text.toLowerCase();
    if (t.includes('profit') || t.includes('margin') || t.includes('p&l') || t.includes('summary')) {
      const totalRev = ctx.projects.reduce((s, p) => s + p.totalRevenue, 0);
      const totalCost = ctx.projects.reduce((s, p) => s + p.totalCost, 0);
      const gross = totalRev - totalCost;
      const margin = totalRev > 0 ? ((gross / totalRev) * 100).toFixed(1) : 0;
      return `Here's your current P&L across all ${ctx.projects.length} contracts:\n\nTotal Revenue: $${totalRev.toLocaleString()}\nTotal Costs: $${totalCost.toLocaleString()}\nGross Profit: $${gross.toLocaleString()}\nOverall Margin: ${margin}%\n\nTop performer: ${ctx.projects.sort((a,b) => b.grossProfit - a.grossProfit)[0]?.name || '—'}`;
    }
    if (t.includes('active') || t.includes('open') || t.includes('jobs')) {
      const active = ctx.projects.filter(p => p.phase !== 'closed');
      return `You have ${active.length} active contract${active.length !== 1 ? 's' : ''}:\n\n${active.map(p => `• ${p.name} — ${p.phase} phase`).join('\n')}`;
    }
    return `I understood your request. Once connected to Ollama, I can:\n\n• Create and update contracts\n• Log materials and labor by phase\n• Add and approve change orders\n• Advance project phases\n• Answer P&L and profitability questions\n\nMake sure Ollama is running and the model is pulled.`;
  };

  return (
    <>
    {!open && (
      <button className="ai-launcher" onClick={() => { setOpen(true); setMinimized(false); }} title="Open AI Assistant">✦</button>
    )}
    {open && (
    <div className={`ai-sidebar ${minimized ? 'minimized' : ''}`}>
      <div className="ai-sidebar-header">
        <div className="ai-sidebar-title">
          <div className={`ai-orb ${thinking ? 'thinking' : ''}`}>✦</div>
          <div className="ai-title-text">AI ASSISTANT</div>
          <div className="ai-header-actions">
            <button className="ai-header-btn" onClick={() => setMinimized(m => !m)} title={minimized ? 'Expand' : 'Minimize'}>{minimized ? '▢' : '–'}</button>
            <button className="ai-header-btn" onClick={() => setOpen(false)} title="Close">×</button>
          </div>
        </div>
        {!minimized && <div className="ai-subtitle">Natural language contract management</div>}
        <div className="ai-model-badge">
          <span className="ai-model-dot" style={{
            background: connected === null ? '#f59e0b' : connected ? '#16a34a' : '#dc2626',
            boxShadow: connected === null ? '0 0 6px #f59e0b' : connected ? '0 0 6px #16a34a' : '0 0 6px #dc2626',
          }} />
          {connected === null ? 'Connecting...' : connected ? (aiInfo?.model || 'AI ready') : 'Offline — check Ollama'}
        </div>
      </div>

      {!minimized && (<div className="ai-messages">
        {messages.map((msg, i) => (
          <div key={i} className={`ai-msg ${msg.role}`}>
            {(msg.role === 'user' || msg.role === 'assistant') &&
              <div className="ai-msg-role">{msg.role === 'user' ? 'YOU' : 'APEX AI'}</div>}
            <div className="ai-msg-bubble">{msg.content}</div>
          </div>
        ))}
        {thinking && (
          <div className="ai-msg assistant">
            <div className="ai-msg-role">APEX AI</div>
            <div className="ai-typing"><span /><span /><span /></div>
          </div>
        )}
        <div ref={messagesEndRef} />
      </div>)}

      {!minimized && showSuggestions && (
        <div className="ai-suggestions">
          <div className="ai-suggestion-label">TRY ASKING</div>
          {SUGGESTIONS.slice(0, 3).map((s, i) => (
            <button key={i} className="ai-suggestion" onClick={() => sendMessage(s)}>{s}</button>
          ))}
        </div>
      )}

      {!minimized && (<div className="ai-input-area">
        <div className="ai-input-row">
          <textarea
            ref={textareaRef}
            className="ai-textarea"
            placeholder="Tell me what to do..."
            value={input}
            onChange={handleInputChange}
            onKeyDown={handleKeyDown}
            rows={1}
            disabled={thinking}
          />
          <button className="ai-send-btn" onClick={() => sendMessage(input)} disabled={thinking || !input.trim()}>
            ↑
          </button>
        </div>
        <div className="ai-hint">Enter to send · Shift+Enter for new line</div>
      </div>)}
    </div>
    )}
    </>
  );
}

function App() {
  const [page, setPage] = useState('dashboard');
  const [projects, setProjects] = useState([]);
  const [employees, setEmployees] = useState([]);
  const [selectedProject, setSelectedProject] = useState(null);
  const [refreshTick, setRefreshTick] = useState(0);  // bumped on refresh so CalendarPage reloads tasks

  React.useEffect(() => {
    fetch('/api/projects').then(r => r.json()).then(setProjects);
    fetch('/api/employees').then(r => r.json()).then(setEmployees);
  }, []);

  const updateProject = async (updated) => {
    await fetch(`/api/projects/${updated.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
    setProjects(ps => ps.map(p => p.id === updated.id ? updated : p));
    if (selectedProject?.id === updated.id) setSelectedProject(updated);
  };

  const addProject = (p) => setProjects(ps => [...ps, p]);
