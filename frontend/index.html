<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star-Astro — Contract Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e3e3e6;
    --surface: #f5f5f6;
    --surface2: #ebebed;
    --surface3: #dddddf;
    --border: #d0d0d3;
    --border2: #b9b9bd;
    --accent: #1a6cff;
    --accent2: #4488ff;
    --accent-dim: rgba(26,108,255,0.08);
    --accent-glow: rgba(26,108,255,0.22);
    --text: #1c1c1e;
    --text2: #57575c;
    --text3: #8e8e93;
    --green: #0a8a4e;
    --green-dim: rgba(10,138,78,0.10);
    --red: #d42b2b;
    --red-dim: rgba(212,43,43,0.09);
    --blue: #1a6cff;
    --blue-dim: rgba(26,108,255,0.09);
    --phase-membrane: #7c3aed;
    --phase-metal: #0e6cc4;
    --phase-qc: #0a8a6e;
    --phase-change: #c25c00;
    --phase-retainage: #b81c1c;
    --phase-closed: #0a7a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Subtle grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(26,108,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,108,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    box-shadow: 2px 0 12px rgba(0,0,0,0.06);
  }
  .sidebar-logo {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .sidebar {
    box-shadow: 2px 0 12px rgba(0,0,0,0.06);
  }
  .logo-sub {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
  }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .nav-section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    padding: 8px 12px 6px;
    margin-top: 8px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text2);
    font-size: 13.5px;
    font-weight: 500;
    transition: all 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: rgba(26,108,255,0.2);
  }
  .nav-icon { font-size: 16px; width: 18px; text-align: center; }

  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  /* ── MAIN ── */
  .main { flex: 1; overflow-y: auto; }
  .page-header {
    padding: 32px 36px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    background: var(--surface);
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }
  .page-subtitle { color: var(--text3); font-size: 13px; margin-top: 4px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #ffffff;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--surface3); color: var(--text); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(231,76,60,0.25); }
  .btn-danger:hover { background: rgba(231,76,60,0.2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .content { padding: 28px 36px; }

  /* ── STATS CARDS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 12px 12px 0 0;
  }
  .stat-card.green::after { background: var(--green); }
  .stat-card.red::after { background: var(--red); }
  .stat-card.blue::after { background: var(--blue); }
  .stat-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 8px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; line-height: 1; }
  .stat-value.currency::before { font-size: 18px; vertical-align: top; margin-top: 4px; display: inline-block; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }
  .stat-trend-up { color: var(--green); }
  .stat-trend-down { color: var(--red); }

  /* ── PIPELINE ── */
  .pipeline-row {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .pipeline-stage {
    flex: 1;
    min-width: 110px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .pipeline-stage::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
  }
  .pipeline-stage.s-membrane::before { background: var(--phase-membrane); }
  .pipeline-stage.s-metal::before { background: var(--phase-metal); }
  .pipeline-stage.s-qc::before { background: var(--phase-qc); }
  .pipeline-stage.s-change::before { background: var(--phase-change); }
  .pipeline-stage.s-retainage::before { background: var(--phase-retainage); }
  .pipeline-stage.s-closed::before { background: var(--phase-closed); }
  .pipeline-stage:hover { border-color: var(--border2); background: var(--surface2); }
  .pipeline-stage.active { border-color: var(--accent); background: var(--accent-dim); }
  .ps-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; }
  .ps-count { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text); line-height: 1.1; margin-top: 4px; }
  .ps-value { font-size: 12px; color: var(--text2); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-toolbar {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 260px;
    outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }
  .td-project { font-weight: 600; color: var(--text); }
  .td-client { color: var(--text2); font-size: 12px; margin-top: 2px; }
  .td-mono { font-family: 'DM Mono', monospace; font-size: 12.5px; }
  .td-green { color: var(--green); }
  .td-red { color: var(--red); }

  /* ── PHASE BADGE ── */
  .phase-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .pb-dot { width: 6px; height: 6px; border-radius: 50%; }
  .ph-membrane { background: rgba(142,68,173,0.15); color: #c39bd3; }
  .ph-membrane .pb-dot { background: var(--phase-membrane); }
  .ph-metal { background: rgba(41,128,185,0.15); color: #7fb3d3; }
  .ph-metal .pb-dot { background: var(--phase-metal); }
  .ph-qc { background: rgba(22,160,133,0.15); color: #76d7c4; }
  .ph-qc .pb-dot { background: var(--phase-qc); }
  .ph-change { background: rgba(230,126,34,0.15); color: #f0b27a; }
  .ph-change .pb-dot { background: var(--phase-change); }
  .ph-retainage { background: rgba(192,57,43,0.15); color: #ec7063; }
  .ph-retainage .pb-dot { background: var(--phase-retainage); }
  .ph-closed { background: rgba(39,174,96,0.15); color: #82e0aa; }
  .ph-closed .pb-dot { background: var(--phase-closed); }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap { width: 80px; }
  .progress-bar-track {
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.3s;
  }
  .progress-bar-fill.green { background: var(--green); }
  .progress-pct { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    width: 100%;
    max-width: 780px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(-16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1.5px; }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--surface3); color: var(--text); }
  .modal-body { padding: 24px 28px; }
  .modal-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; }
  .form-input, .form-select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 9px 13px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }

  /* ── DETAIL VIEW ── */
  .detail-tabs {
    display: flex;
    gap: 4px;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .detail-tab {
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .detail-tab:hover { color: var(--text2); }
  .detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }
  .section-card-body { padding: 16px 18px; }

  .inline-table { width: 100%; border-collapse: collapse; }
  .inline-table th {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .inline-table td { padding: 9px 10px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .inline-table tbody tr:last-child td { border-bottom: none; }
  .inline-table tbody tr:hover { background: var(--surface2); }

  .pl-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .pl-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .pl-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .pl-value { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; }
  .pl-value.pos { color: var(--green); }
  .pl-value.neg { color: var(--red); }
  .pl-value.neu { color: var(--text); }

  .phase-progress {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .phase-step {
    flex: 1;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 10px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    color: var(--text3);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .phase-step:hover { border-color: var(--accent); color: var(--text2); }
  .phase-step.done { background: var(--green-dim); border-color: rgba(46,204,113,0.3); color: var(--green); }
  .phase-step.current { background: var(--accent-dim); border-color: rgba(232,160,32,0.4); color: var(--accent); font-weight: 600; }

  /* Tag for change orders */
  .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: 'DM Mono', monospace; }
  .tag-orange { background: rgba(230,126,34,0.15); color: #f0b27a; }
  .tag-green { background: var(--green-dim); color: var(--green); }
  .tag-red { background: var(--red-dim); color: var(--red); }
  .tag-blue { background: var(--blue-dim); color: var(--blue); }

  /* Retainage bar */
  .retainage-bar-wrap { margin: 8px 0; }
  .retainage-track {
    height: 8px;
    background: var(--surface3);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 4px;
  }
  .retainage-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--green), #1abc9c);
    transition: width 0.4s;
  }
  .retainage-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 4px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state-text { font-size: 15px; color: var(--text2); margin-bottom: 6px; }
  .empty-state-sub { font-size: 13px; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  .add-row-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    border-radius: 6px;
    width: 100%;
    background: none;
    border: 1px dashed var(--border);
    margin-top: 8px;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ── AI CHAT SIDEBAR ── */
  .ai-sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    box-shadow: -2px 0 12px rgba(0,0,0,0.06);
  }

  .ai-header-actions {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }
  .ai-header-btn {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .ai-header-btn:hover { background: var(--surface3); color: var(--text); }

  .ai-sidebar.minimized {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 280px;
    min-width: 0;
    height: auto;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    z-index: 50;
    overflow: hidden;
  }
  .ai-sidebar.minimized .ai-sidebar-header { border-bottom: none; }

  .ai-launcher {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    color: #fff;
    border: none;
    cursor: pointer;

const fmt = (n) => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
const fmtSigned = (n) => (n >= 0 ? '+' : '-') + '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
const pct = (n, d) => d === 0 ? '0%' : Math.round((n / d) * 100) + '%';
const pctNum = (n, d) => d === 0 ? 0 : Math.round((n / d) * 100);

function calcProject(p, employees) {
  const empMap = Object.fromEntries(employees.map(e => [e.id, e]));
  let totalMaterials = 0, totalLabor = 0;
  Object.values(p.phases).forEach(ph => {
    ph.materials.forEach(m => totalMaterials += m.amount);
    ph.labor.forEach(l => {
      const emp = empMap[l.employeeId];
      if (emp) totalLabor += emp.rate * l.hours;
    });
  });
  const approvedCOs = p.changeOrders.filter(co => co.approved).reduce((s, co) => s + co.amount, 0);
  const totalRevenue = p.contractValue + approvedCOs;
  const totalCost = totalMaterials + totalLabor;
  const gross = totalRevenue - totalCost;
  const margin = totalRevenue > 0 ? (gross / totalRevenue) * 100 : 0;
  return { totalMaterials, totalLabor, totalRevenue, totalCost, gross, margin };
}

function AddProjectModal({ onClose, onAdd, employees }) {
  const [form, setForm] = useState({ name: '', client: '', contractValue: '', startDate: '', phase: 'membrane', notes: '' });

  const emptyPhases = Object.fromEntries(PHASES.map(p => [p.id, { materials: [], labor: [] }]));
  const [error, setError] = useState('');
  const handle = async () => {
    if (!form.name || !form.client || !form.contractValue) return;
    setError('');
    try {
      const res = await fetch('/api/projects', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: form.name, client: form.client, contractValue: parseFloat(form.contractValue), startDate: form.startDate, phase: form.phase, notes: form.notes }) });

      if (!res.ok) { setError(p.error || 'Failed to create contract'); return; }

  };

        <td><input className="form-input" style={{ padding: '6px 10px' }} placeholder="Description" value={form.desc} onChange={set('desc')} /></td>
        <td><input className="form-input" style={{ padding: '6px 10px' }} placeholder="Vendor" value={form.vendor} onChange={set('vendor')} /></td>
        <td><input className="form-input" style={{ padding: '6px 10px', width: 100 }} type="number" placeholder="0.00" value={form.amount} onChange={set('amount')} /></td>
        <td>
          <div style={{ display: 'flex', gap: 6 }}>
            <button className="btn btn-primary btn-sm" onClick={handle}>Add</button>
            <button className="btn btn-ghost btn-sm" onClick={onCancel}>×</button>
          </div>
        </td>
      </> : <>
        <td>
          <select className="form-select" style={{ padding: '6px 10px' }} value={form.employeeId} onChange={set('employeeId')}>
            {employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
        </td>
        <td><input className="form-input" style={{ padding: '6px 10px', width: 80 }} type="number" placeholder="0" value={form.hours} onChange={set('hours')} /></td>
        <td><input className="form-input" style={{ padding: '6px 10px' }} placeholder="Notes" value={form.notes} onChange={set('notes')} /></td>
        <td>
          <div style={{ display: 'flex', gap: 6 }}>
            <button className="btn btn-primary btn-sm" onClick={handle}>Add</button>
            <button className="btn btn-ghost btn-sm" onClick={onCancel}>×</button>
          </div>
        </td>
      </>}
    </tr>
  );
}

function ContractDetailsEditor({ project, onUpdate }) {
  const [form, setForm] = useState({ name: project.name, client: project.client || '', contractValue: project.contractValue || '', startDate: project.startDate || '', notes: project.notes || '' });
  const [dirty, setDirty] = useState(false);
  const set = k => e => { setForm(f => ({ ...f, [k]: e.target.value })); setDirty(true); };
  const save = () => {
    onUpdate({ ...project, name: form.name, client: form.client, contractValue: parseFloat(form.contractValue) || 0, startDate: form.startDate, notes: form.notes });
    setDirty(false);
  };
  return (
    <div className="section-card" style={{ marginBottom: 16 }}>
      <div className="section-card-header">
        <div className="section-card-title">Contract Details</div>
        {dirty && <button className="btn btn-primary btn-sm" onClick={save}>Save Changes</button>}
      </div>
      <div className="section-card-body">
        <div className="form-grid">
          <div className="form-group full">
            <label className="form-label">Project Name</label>
            <input className="form-input" value={form.name} onChange={set('name')} />
          </div>
          <div className="form-group">
            <label className="form-label">Client / Owner</label>
            <input className="form-input" value={form.client} onChange={set('client')} />
          </div>
          <div className="form-group">
            <label className="form-label">Contract Value ($)</label>
            <input className="form-input" type="number" value={form.contractValue} onChange={set('contractValue')} />
          </div>
          <div className="form-group">
            <label className="form-label">Start Date</label>
            <input className="form-input" type="date" value={form.startDate} onChange={set('startDate')} />

          <div className="form-group full">

  );
}

// ── INVOICES TAB ──────────────────────────────────────────────────────────
const INVOICE_STATUSES = ['draft', 'sent', 'paid', 'void'];
const INVOICE_STATUS_COLOR = { draft: 'var(--text3)', sent: 'var(--blue)', paid: 'var(--green)', void: 'var(--red)' };
const blankItem = () => ({ description: '', quantity: 1, unitPrice: 0 });

function InvoiceTab({ project }) {
  const [invoices, setInvoices] = useState([]);
  const [loading, setLoading] = useState(true);
  const [creating, setCreating] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState(null); // { number, status, issueDate, dueDate, notes, items: [] }
  const [error, setError] = useState('');

  const load = async () => {
    setLoading(true);
    try {
      const res = await fetch(`/api/projects/${project.id}/invoices`);
      setInvoices(await res.json());
    } catch (e) { setError(e.message); }
    setLoading(false);
  };
  React.useEffect(() => { load(); }, [project.id]);

  const startCreate = () => {
    setEditingId(null);
    setDraft({ number: '', status: 'draft', issueDate: new Date().toISOString().slice(0, 10), dueDate: '', notes: '', items: [blankItem()] });
    setCreating(true);
  };
  const startEdit = (inv) => {
    setCreating(false);
    setEditingId(inv.id);
    setDraft({
      number: inv.number, status: inv.status, issueDate: inv.issueDate || '',
      dueDate: inv.dueDate || '', notes: inv.notes || '',
      items: inv.items.length ? inv.items.map(it => ({ description: it.description, quantity: it.quantity, unitPrice: it.unitPrice })) : [blankItem()],
    });
  };
  const cancel = () => { setCreating(false); setEditingId(null); setDraft(null); setError(''); };

  const setItem = (i, key, val) => setDraft(d => ({ ...d, items: d.items.map((it, j) => j === i ? { ...it, [key]: val } : it) }));
  const addItem = () => setDraft(d => ({ ...d, items: [...d.items, blankItem()] }));
  const removeItem = (i) => setDraft(d => ({ ...d, items: d.items.filter((_, j) => j !== i) }));
  const draftTotal = () => (draft?.items || []).reduce((s, it) => s + (parseFloat(it.quantity) || 0) * (parseFloat(it.unitPrice) || 0), 0);

  const save = async () => {
    setError('');
    const payload = {
      number: draft.number.trim(),
      status: draft.status,
      issueDate: draft.issueDate || null,
      dueDate: draft.dueDate || null,
      notes: draft.notes,
      items: draft.items
        .filter(it => it.description.trim() || parseFloat(it.unitPrice))
        .map(it => ({ description: it.description, quantity: parseFloat(it.quantity) || 0, unitPrice: parseFloat(it.unitPrice) || 0 })),
    };
    try {
      const url = editingId ? `/api/invoices/${editingId}` : `/api/projects/${project.id}/invoices`;
      const res = await fetch(url, { method: editingId ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (!res.ok) throw new Error((await res.json()).error || 'Save failed');
      cancel();
      load();
    } catch (e) { setError(e.message); }
  };

  const remove = async (inv) => {
    if (!window.confirm(`Delete invoice ${inv.number}? This cannot be undone.`)) return;
    await fetch(`/api/invoices/${inv.id}`, { method: 'DELETE' });
    load();
  };
  const quickStatus = async (inv, status) => {
    await fetch(`/api/invoices/${inv.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
    load();
  };

  const editor = draft && (
    <div style={{ border: '1px solid var(--border2)', borderRadius: 8, padding: 14, marginBottom: 16, background: 'var(--surface2)' }}>
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginBottom: 10 }}>
        <label style={{ flex: '1 1 130px', fontSize: 12 }}>Invoice #
          <input value={draft.number} placeholder="auto" onChange={e => setDraft(d => ({ ...d, number: e.target.value }))} style={{ width: '100%' }} />
        </label>
        <label style={{ flex: '1 1 120px', fontSize: 12 }}>Status
          <select value={draft.status} onChange={e => setDraft(d => ({ ...d, status: e.target.value }))} style={{ width: '100%' }}>
            {INVOICE_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </label>
        <label style={{ flex: '1 1 130px', fontSize: 12 }}>Issued
          <input type="date" value={draft.issueDate || ''} onChange={e => setDraft(d => ({ ...d, issueDate: e.target.value }))} style={{ width: '100%' }} />
        </label>
        <label style={{ flex: '1 1 130px', fontSize: 12 }}>Due
          <input type="date" value={draft.dueDate || ''} onChange={e => setDraft(d => ({ ...d, dueDate: e.target.value }))} style={{ width: '100%' }} />
        </label>
      </div>

      <table className="inline-table" style={{ marginBottom: 8 }}>
        <thead><tr><th>Description</th><th style={{ width: 70 }}>Qty</th><th style={{ width: 110 }}>Unit price</th><th style={{ width: 110 }}>Amount</th><th style={{ width: 36 }}></th></tr></thead>
        <tbody>
          {draft.items.map((it, i) => (
            <tr key={i}>
              <td><input value={it.description} onChange={e => setItem(i, 'description', e.target.value)} style={{ width: '100%' }} placeholder="Line item" /></td>
              <td><input type="number" value={it.quantity} onChange={e => setItem(i, 'quantity', e.target.value)} style={{ width: '100%' }} /></td>
              <td><input type="number" value={it.unitPrice} onChange={e => setItem(i, 'unitPrice', e.target.value)} style={{ width: '100%' }} /></td>
              <td>{fmt((parseFloat(it.quantity) || 0) * (parseFloat(it.unitPrice) || 0))}</td>
              <td><button className="btn-icon" title="Remove line" onClick={() => removeItem(i)}>✕</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      <button className="btn-ghost" onClick={addItem} style={{ marginBottom: 10 }}>+ Add line</button>

      <label style={{ display: 'block', fontSize: 12, marginBottom: 10 }}>Notes
        <textarea value={draft.notes} onChange={e => setDraft(d => ({ ...d, notes: e.target.value }))} style={{ width: '100%', minHeight: 48 }} />
      </label>

      {error && <div style={{ color: 'var(--red)', fontSize: 12, marginBottom: 8 }}>{error}</div>}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontWeight: 600 }}>Total: {fmt(draftTotal())}</div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn-ghost" onClick={cancel}>Cancel</button>
          <button className="btn-primary" onClick={save}>{editingId ? 'Save changes' : 'Create invoice'}</button>
        </div>
      </div>
    </div>
  );

  return (
    <>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
        <div style={{ fontSize: 13, color: 'var(--text2)' }}>
          {invoices.length} invoice{invoices.length !== 1 ? 's' : ''} · Billed {fmt(invoices.reduce((s, i) => s + i.total, 0))} · Paid {fmt(invoices.filter(i => i.status === 'paid').reduce((s, i) => s + i.total, 0))}
        </div>
        {!creating && editingId === null && <button className="btn-primary" onClick={startCreate}>+ New invoice</button>}
      </div>

      {creating && draft && editor}

      {loading ? <div style={{ color: 'var(--text3)', fontSize: 13 }}>Loading…</div> : (
        invoices.length === 0 && !creating ? (
          <div className="empty-state"><div className="empty-state-sub">No invoices yet. Create one, or ask the AI assistant: "invoice {project.name} for the deposit".</div></div>
        ) : (
          <table className="inline-table">
            <thead><tr><th>Invoice</th><th>Status</th><th>Issued</th><th>Due</th><th style={{ textAlign: 'right' }}>Total</th><th style={{ width: 150 }}></th></tr></thead>
            <tbody>
              {invoices.map(inv => editingId === inv.id ? (
                <tr key={inv.id}><td colSpan={6} style={{ padding: 0 }}>{draft && editor}</td></tr>
              ) : (
                <tr key={inv.id}>
                  <td style={{ fontWeight: 600 }}>{inv.number}<div style={{ fontSize: 11, color: 'var(--text3)' }}>{inv.items.length} line{inv.items.length !== 1 ? 's' : ''}</div></td>
                  <td>
                    <select value={inv.status} onChange={e => quickStatus(inv, e.target.value)} style={{ color: INVOICE_STATUS_COLOR[inv.status], fontWeight: 600, border: '1px solid var(--border)', borderRadius: 4, padding: '2px 4px' }}>
                      {INVOICE_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </td>
                  <td style={{ color: 'var(--text2)' }}>{inv.issueDate || '—'}</td>
                  <td style={{ color: 'var(--text2)' }}>{inv.dueDate || '—'}</td>
                  <td style={{ textAlign: 'right', fontWeight: 600 }}>{fmt(inv.total)}</td>
                  <td style={{ textAlign: 'right' }}>
                    <button className="btn-ghost" onClick={() => startEdit(inv)}>Edit</button>
                    <button className="btn-ghost" style={{ color: 'var(--red)' }} onClick={() => remove(inv)}>Delete</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )
      )}
    </>
  );
}

function ProjectDetail({ project, employees, onClose, onUpdate, onDelete }) {
  const [tab, setTab] = useState('overview');
  const [activePhase, setActivePhase] = useState(project.phase);
  const [addingMat, setAddingMat] = useState(false);
  const [addingLab, setAddingLab] = useState(false);
  const [addingCO, setAddingCO] = useState(false);
  const [coForm, setCoForm] = useState({ description: '', amount: '' });
  const [editingMat, setEditingMat] = useState(null); // { id, desc, vendor, amount }
  const [editingLab, setEditingLab] = useState(null); // { id, employeeId, hours, notes }
  const [editingCO, setEditingCO] = useState(null);   // { id, description, amount }
  const [docs, setDocs] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [uploadError, setUploadError] = useState('');
  const fileInputRef = React.useRef(null);

  // Load documents when Documents tab is opened
  React.useEffect(() => {
    if (tab === 'documents') loadDocs();
  }, [tab]);

  const loadDocs = async () => {
    try {
      const res = await fetch(`/api/projects/${project.id}/documents`);
      if (res.ok) setDocs(await res.json());
    } catch {}
  };

  const handleFileUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    setUploadError('');
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch(`/api/projects/${project.id}/documents`, { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      await loadDocs();
    } catch (err) {
      setUploadError(err.message);
    } finally {
      setUploading(false);
      if (fileInputRef.current) fileInputRef.current.value = '';
    }
  };

  const handleDeleteDoc = async (docId, filename) => {
    if (!confirm(`Remove "${filename}" from this project? This will delete its embeddings from the AI.`)) return;
    await fetch(`/api/projects/${project.id}/documents/${docId}`, { method: 'DELETE' });
    await loadDocs();
  };

  const deleteMaterial = async (matId, phase) => {
    await fetch(`/api/projects/${project.id}/materials/${matId}`, { method: 'DELETE' });
    const updated = { ...project, phases: { ...project.phases, [phase]: { ...project.phases[phase], materials: project.phases[phase].materials.filter(m => m.id !== matId) } } };
    onUpdate(updated);
  };

  const saveEditMaterial = async (phase) => {
    if (!editingMat) return;
    await fetch(`/api/projects/${project.id}/materials/${editingMat.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ desc: editingMat.desc, vendor: editingMat.vendor, amount: parseFloat(editingMat.amount) || 0 }) });
    const updated = { ...project, phases: { ...project.phases, [phase]: { ...project.phases[phase], materials: project.phases[phase].materials.map(m => m.id === editingMat.id ? { ...m, desc: editingMat.desc, vendor: editingMat.vendor, amount: parseFloat(editingMat.amount) || 0 } : m) } } };
    onUpdate(updated);
    setEditingMat(null);
  };

  const deleteLabor = async (labId, phase) => {
    await fetch(`/api/projects/${project.id}/labor/${labId}`, { method: 'DELETE' });
    const updated = { ...project, phases: { ...project.phases, [phase]: { ...project.phases[phase], labor: project.phases[phase].labor.filter(l => l.id !== labId) } } };
    onUpdate(updated);
  };

  const saveEditLabor = async (phase) => {
    if (!editingLab) return;
    await fetch(`/api/projects/${project.id}/labor/${editingLab.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ employeeId: editingLab.employeeId, hours: parseFloat(editingLab.hours) || 0, notes: editingLab.notes }) });
    const updated = { ...project, phases: { ...project.phases, [phase]: { ...project.phases[phase], labor: project.phases[phase].labor.map(l => l.id === editingLab.id ? { ...l, employeeId: editingLab.employeeId, hours: parseFloat(editingLab.hours) || 0, notes: editingLab.notes } : l) } } };
    onUpdate(updated);
    setEditingLab(null);
  };

  const deleteCO = async (coId) => {
    await fetch(`/api/projects/${project.id}/change-orders/${coId}`, { method: 'DELETE' });
    const updated = { ...project, changeOrders: project.changeOrders.filter(co => co.id !== coId) };
    onUpdate(updated);
  };

  const saveEditCO = async () => {
    if (!editingCO) return;
    await fetch(`/api/projects/${project.id}/change-orders/${editingCO.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ description: editingCO.description, amount: parseFloat(editingCO.amount) || 0 }) });
    const updated = { ...project, changeOrders: project.changeOrders.map(co => co.id === editingCO.id ? { ...co, description: editingCO.description, amount: parseFloat(editingCO.amount) || 0 } : co) };
    onUpdate(updated);
    setEditingCO(null);
  };

  const empMap = Object.fromEntries(employees.map(e => [e.id, e]));
  const calc = calcProject(project, employees);

  const updatePhase = (phase) => {
    onUpdate({ ...project, phase });
  };

  const addMaterial = async (item) => {
    const res = await fetch(`/api/projects/${project.id}/materials`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phase: activePhase, desc: item.desc, vendor: item.vendor, amount: item.amount }) });
    const saved = res.ok ? await res.json() : item;
    const updated = { ...project };
    updated.phases = { ...updated.phases };
    updated.phases[activePhase] = { ...updated.phases[activePhase] };
    updated.phases[activePhase].materials = [...updated.phases[activePhase].materials, saved];
    onUpdate(updated);
    setAddingMat(false);
  };

  const addLabor = async (item) => {
    const res = await fetch(`/api/projects/${project.id}/labor`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phase: activePhase, employeeId: item.employeeId, hours: item.hours, notes: item.notes }) });
    const saved = res.ok ? await res.json() : item;
    const updated = { ...project };
    updated.phases = { ...updated.phases };
    updated.phases[activePhase] = { ...updated.phases[activePhase] };
    updated.phases[activePhase].labor = [...updated.phases[activePhase].labor, saved];
    onUpdate(updated);
    setAddingLab(false);
  };

  const addCO = () => {
    if (!coForm.description || !coForm.amount) return;
    const updated = { ...project, changeOrders: [...project.changeOrders, { id: 'co' + Date.now(), description: coForm.description, amount: parseFloat(coForm.amount), approved: false }] };
    onUpdate(updated);
    setCoForm({ description: '', amount: '' });
    setAddingCO(false);
  };

  const toggleCOApprove = (coId) => {
    const updated = { ...project, changeOrders: project.changeOrders.map(co => co.id === coId ? { ...co, approved: !co.approved } : co) };
    onUpdate(updated);
  };

  const allMaterials = PHASES.flatMap(ph => (project.phases[ph.id] || { materials: [] }).materials.map(m => ({ ...m, _phase: ph.id })));
  const allLabor = PHASES.flatMap(ph => (project.phases[ph.id] || { labor: [] }).labor.map(l => ({ ...l, _phase: ph.id })));
  const phaseMaterialTotal = allMaterials.reduce((s, m) => s + m.amount, 0);
  const phaseLaborTotal = allLabor.reduce((s, l) => { const e = empMap[l.employeeId]; return s + (e ? e.rate * l.hours : 0); }, 0);
  const pendingCOs = project.changeOrders.filter(co => !co.approved).reduce((s, co) => s + co.amount, 0);
  const currentPhaseIdx = PHASE_INDEX[project.phase] || 0;

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: 900 }}>
        <div className="modal-header">
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div className="modal-title">{project.name}</div>
              <PhaseBadge phase={project.phase} />
            </div>
            <div style={{ color: 'var(--text3)', fontSize: 12, marginTop: 4 }}>{project.client} · Started {project.startDate || '—'}</div>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <button className="btn btn-danger btn-sm" onClick={() => { if(confirm(`Delete "${project.name}"? This cannot be undone.`)) { onDelete(project.id); onClose(); } }}>Delete Contract</button>
            <button className="modal-close" onClick={onClose}>×</button>
          </div>
        </div>

        {/* Phase stepper */}
        <div style={{ padding: '14px 28px', borderBottom: '1px solid var(--border)', background: 'var(--surface)' }}>
          <div className="phase-progress">
            {PHASES.map((p, i) => (
              <div
                key={p.id}
                className={`phase-step ${i < currentPhaseIdx ? 'done' : i === currentPhaseIdx ? 'current' : ''}`}
                onClick={() => updatePhase(p.id)}
                title={`Move to ${p.label}`}
              >
                {i < currentPhaseIdx ? '✓ ' : ''}{p.label}
              </div>
            ))}
          </div>
          <div style={{ fontSize: 11, color: 'var(--text3)' }}>Click a phase to advance the project status</div>
        </div>

        <div className="detail-tabs">
          {['overview', 'expenses', 'change orders', 'invoices', 'retainage', 'documents'].map(t => (
            <div key={t} className={`detail-tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
              {t.charAt(0).toUpperCase() + t.slice(1)}
              {t === 'change orders' && project.changeOrders.length > 0 &&
                <span style={{ marginLeft: 6, background: 'var(--accent)', color: '#fff', borderRadius: 10, padding: '1px 6px', fontSize: 10, fontWeight: 700 }}>{project.changeOrders.length}</span>}
              {t === 'documents' && docs.length > 0 &&
                <span style={{ marginLeft: 6, background: 'var(--blue)', color: '#fff', borderRadius: 10, padding: '1px 6px', fontSize: 10, fontWeight: 700 }}>{docs.length}</span>}
            </div>
          ))}
        </div>

        <div className="modal-body" style={{ maxHeight: 520, overflowY: 'auto' }}>

          {/* OVERVIEW */}
          {tab === 'overview' && (
            <>
              <div className="pl-summary">
                <div className="pl-card">
                  <div className="pl-label">Contract Revenue</div>
                  <div className="pl-value neu">{fmt(calc.totalRevenue)}</div>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 4 }}>Base: {fmt(project.contractValue)}</div>
                </div>
                <div className="pl-card">
                  <div className="pl-label">Total Costs</div>
                  <div className="pl-value neu">{fmt(calc.totalCost)}</div>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 4 }}>Mat: {fmt(calc.totalMaterials)} · Labor: {fmt(calc.totalLabor)}</div>
                </div>
                <div className="pl-card">

// ── EMPLOYEES PAGE ──
function EmployeesPage({ employees, onAddEmployee, onDeleteEmployee, onUpdateEmployee }) {
  const [form, setForm] = useState({ name: '', role: '', rate: '' });
  const [adding, setAdding] = useState(false);
  const [editing, setEditing] = useState(null);
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
  const handle = async () => {
    if (!form.name || !form.rate) return;
    const res = await fetch('/api/employees', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: form.name, role: form.role, rate: parseFloat(form.rate) }) });
    const emp = await res.json();
    onAddEmployee(emp);
    setForm({ name: '', role: '', rate: '' });
    setAdding(false);
  };
  const saveEdit = () => {
    if (!editing) return;
    onUpdateEmployee({ ...editing, rate: parseFloat(editing.rate) || 0 });
    setEditing(null);
  };
  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">EMPLOYEES</div>
          <div className="page-subtitle">Labor rates used to calculate job costs</div>
        </div>
        <button className="btn btn-primary" onClick={() => setAdding(v => !v)}>+ Add Employee</button>
      </div>
      <div className="content">
        {adding && (
          <div className="section-card" style={{ marginBottom: 20 }}>
            <div className="section-card-header"><div className="section-card-title">New Employee</div></div>
            <div className="section-card-body">
              <div className="form-grid">
                <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" value={form.name} onChange={set('name')} placeholder="Name" /></div>
                <div className="form-group"><label className="form-label">Role / Title</label><input className="form-input" value={form.role} onChange={set('role')} placeholder="Foreman, Journeyman..." /></div>
                <div className="form-group"><label className="form-label">Hourly Rate ($)</label><input className="form-input" type="number" value={form.rate} onChange={set('rate')} placeholder="0.00" /></div>
              </div>
              <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
                <button className="btn btn-primary" onClick={handle}>Save Employee</button>
                <button className="btn btn-ghost" onClick={() => setAdding(false)}>Cancel</button>
              </div>
            </div>
          </div>
        )}
        <div className="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Role</th><th>Hourly Rate</th><th>Annual (2080 hrs)</th><th style={{ width: 120 }}>Actions</th></tr></thead>
            <tbody>
              {employees.map(e => editing?.id === e.id ? (
                <tr key={e.id}>
                  <td><input className="form-input" style={{ padding: '5px 8px' }} value={editing.name} onChange={ev => setEditing(v => ({ ...v, name: ev.target.value }))} /></td>
                  <td><input className="form-input" style={{ padding: '5px 8px' }} value={editing.role} onChange={ev => setEditing(v => ({ ...v, role: ev.target.value }))} /></td>
                  <td><input className="form-input" style={{ padding: '5px 8px', width: 100 }} type="number" value={editing.rate} onChange={ev => setEditing(v => ({ ...v, rate: ev.target.value }))} /></td>
                  <td style={{ fontFamily: 'DM Mono', fontSize: 13, color: 'var(--text3)' }}>{fmt((parseFloat(editing.rate) || 0) * 2080)}</td>
                  <td>
                    <button className="btn btn-primary btn-sm" onClick={saveEdit}>Save</button>
                    <button className="btn btn-ghost btn-sm" onClick={() => setEditing(null)}>Cancel</button>
                  </td>
                </tr>
              ) : (
                <tr key={e.id}>
                  <td style={{ fontWeight: 600 }}>{e.name}</td>
                  <td><span className="tag tag-blue">{e.role}</span></td>
                  <td style={{ fontFamily: 'DM Mono', fontSize: 13 }}>${e.rate}/hr</td>
                  <td style={{ fontFamily: 'DM Mono', fontSize: 13, color: 'var(--text3)' }}>{fmt(e.rate * 2080)}</td>
                  <td>
                    <button className="btn btn-ghost btn-sm" onClick={() => setEditing({ id: e.id, name: e.name, role: e.role, rate: e.rate })}>Edit</button>
                    <button className="btn btn-danger btn-sm" onClick={() => { if(confirm(`Remove "${e.name}"?`)) onDeleteEmployee(e.id); }}>Delete</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

const TASK_TYPES = [
  { id: 'itb',      label: 'ITB / RFQ',  short: 'ITB',  color: '#1a6cff' },
  { id: 'deadline', label: 'Deadline',   short: 'DUE',  color: '#d42b2b' },
  { id: 'followup', label: 'Follow-up',  short: 'F/U',  color: '#d97706' },
  { id: 'other',    label: 'Other',      short: 'TASK', color: '#8e8e93' },
];
const TYPE_META = Object.fromEntries(TASK_TYPES.map(t => [t.id, t]));
// Backward-compat aliases for legacy task types
TYPE_META.rfq        = TYPE_META.itb;
TYPE_META.submittal  = TYPE_META.other;
TYPE_META.inspection = TYPE_META.other;

const WORK_TYPES = ['New construction', 'Re-cover', 'Tear-off & replace', 'Remodel', 'Repair', 'Maintenance', 'Other'];
const DOW = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const toYMD = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseYMD = (s) => { const [y,m,d] = String(s).slice(0,10).split('-').map(Number); return new Date(y, m-1, d); };
const fmtDate = (s) => parseYMD(s).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });

function CalendarPage({ projects, onSelectProject, refreshTick }) {
  const [tasks, setTasks] = useState([]);
  const [view, setView] = useState('month');           // 'month' | 'agenda'
  const [cursor, setCursor] = useState(() => { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), 1); });
  const [editing, setEditing] = useState(null);        // task being edited
  const [form, setForm] = useState(null);              // form object when creating/editing

  const load = () => fetch('/api/tasks').then(r => r.json()).then(setTasks).catch(() => {});
  React.useEffect(() => { load(); }, [refreshTick]);

  const todayYMD = toYMD(new Date());
  const projName = (id) => (projects.find(p => p.id === id) || {}).name || '';

  const openCreate = (dateYMD) => {
    setEditing(null);
    setForm({ type: 'itb', title: '', dueDate: dateYMD || '', client: '', workType: '', priority: 'normal', status: 'open', notes: '' });
  };
  const openEdit = (t) => {
    setEditing(t);
    setForm({ type: t.type, title: t.title, dueDate: t.dueDate || '', client: t.client || '', workType: t.workType || '', priority: t.priority, status: t.status, notes: t.notes || '' });
  };
  const closeForm = () => { setForm(null); setEditing(null); };

  const save = async () => {
    if (!form.title.trim()) return;
    const payload = { ...form, dueDate: form.dueDate || null };
    if (editing) {
      await fetch(`/api/tasks/${editing.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    } else {
      await fetch('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    }
    closeForm(); load();
  };
  const setStatus = async (t, status) => {
    await fetch(`/api/tasks/${t.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
    load();
  };
  const remove = async (t) => {
    if (!window.confirm(`Delete task "${t.title}"?`)) return;
    await fetch(`/api/tasks/${t.id}`, { method: 'DELETE' });
    closeForm(); load();
  };

  // Build the 6-week grid for the current cursor month
  const weeks = useMemo(() => {
    const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
    const start = new Date(first); start.setDate(1 - first.getDay());
    const byDay = {};
    tasks.forEach(t => { if (t.dueDate) (byDay[t.dueDate.slice(0,10)] = byDay[t.dueDate.slice(0,10)] || []).push(t); });
    const w = [];
    for (let i = 0; i < 42; i++) {
      const d = new Date(start); d.setDate(start.getDate() + i);
      const ymd = toYMD(d);
      w.push({ date: d, ymd, inMonth: d.getMonth() === cursor.getMonth(), items: byDay[ymd] || [] });
    }
    return w;
  }, [cursor, tasks]);

  const moveMonth = (n) => setCursor(c => new Date(c.getFullYear(), c.getMonth() + n, 1));
  const goToday   = () => { const n = new Date(); setCursor(new Date(n.getFullYear(), n.getMonth(), 1)); };

  const feedUrl = `${location.origin}/api/calendar.ics`;

  // Agenda: open tasks sorted; dated first, undated last
  const agenda = useMemo(() => {
    const open = tasks.filter(t => t.status === 'open');
    const dated = open.filter(t => t.dueDate).sort((a,b) => a.dueDate.localeCompare(b.dueDate));
    const undated = open.filter(t => !t.dueDate);
    return [...dated, ...undated];
  }, [tasks]);

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">CALENDAR</div>
          <div className="page-subtitle">Bid invites, RFQs, submittals, inspections &amp; deadlines</div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn btn-ghost btn-sm" onClick={() => setView(view === 'month' ? 'agenda' : 'month')}>
            {view === 'month' ? '☰ Agenda' : '▦ Month'}
          </button>
          <button className="btn btn-primary" onClick={() => openCreate('')}>+ New task</button>
        </div>
      </div>

      <div className="content">
      <div className="cal-legend">
        {TASK_TYPES.map(t => <span key={t.id}><span className="cal-dot" style={{ background: t.color }}></span>{t.label}</span>)}
      </div>

      {view === 'month' ? (
        <>
          <div className="cal-toolbar">
            <button className="cal-nav-btn" onClick={() => moveMonth(-1)}>‹</button>
            <div className="cal-month-label">{MONTHS[cursor.getMonth()]} {cursor.getFullYear()}</div>
            <button className="cal-nav-btn" onClick={() => moveMonth(1)}>›</button>
            <button className="cal-today-btn" onClick={goToday}>Today</button>
          </div>
          <div className="cal-grid">
            {DOW.map(d => <div key={d} className="cal-dow">{d}</div>)}
            {weeks.map((cell, i) => (
              <div
                key={i}
                className={`cal-cell ${cell.inMonth ? '' : 'cal-other'} ${cell.ymd === todayYMD ? 'cal-today' : ''}`}
                onClick={() => openCreate(cell.ymd)}
              >
                <div className="cal-daynum">{cell.date.getDate()}</div>
                {cell.items.slice(0, 3).map(t => (
                  <button
                    key={t.id}
                    className={`cal-pill ${t.status === 'done' ? 'cal-done' : ''}`}
                    style={{ background: (TYPE_META[t.type] || TYPE_META.other).color }}
                    title={`${(TYPE_META[t.type]||TYPE_META.other).label}: ${t.title}`}
                    onClick={(e) => { e.stopPropagation(); openEdit(t); }}
                  >
                    {(TYPE_META[t.type]||TYPE_META.other).short} {t.title}
                  </button>
                ))}
                {cell.items.length > 3 && <div className="cal-more">+{cell.items.length - 3} more</div>}
              </div>
            ))}
          </div>
        </>
      ) : (
        <div className="table-wrap">
          {agenda.length === 0 ? (
            <div className="empty-state"><div className="empty-state-sub">No open tasks. Create one, or ask the AI assistant: "add an invitation to bid for the Westfield re-roof due next Friday".</div></div>
          ) : agenda.map(t => {
            const meta = TYPE_META[t.type] || TYPE_META.other;
            const overdue = t.dueDate && t.dueDate.slice(0,10) < todayYMD;
            return (
              <div key={t.id} className="agenda-item">
                <span className={`agenda-date ${overdue ? 'agenda-overdue' : ''}`}>{t.dueDate ? fmtDate(t.dueDate) : 'No date'}</span>
                <span className="badge-type" style={{ background: meta.color }}>{meta.short}</span>
                <span style={{ flex: 1, fontWeight: 500 }}>
                  {t.priority === 'high' && <span style={{ color: 'var(--red)', marginRight: 6 }}>⚑</span>}
                  {t.title}
                  {t.client ? <span style={{ color: 'var(--text3)', fontWeight: 400 }}> · {t.client}</span> : null}
                  {t.workType ? <span style={{ color: 'var(--text3)', fontWeight: 400 }}> · {t.workType}</span> : null}
                </span>
                <button className="cal-today-btn" onClick={() => setStatus(t, 'done')}>✓ Done</button>
                <button className="cal-today-btn" onClick={() => openEdit(t)}>Edit</button>
              </div>
            );
          })}
          <div style={{ marginTop: 16, fontSize: 12, color: 'var(--text2)' }}>
            Subscribe from Google / Outlook / iPhone: <span className="cal-feed-link">{feedUrl}</span>
          </div>
        </div>
      )}
      </div>

      {form && (
        <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && closeForm()}>
          <div className="modal">
            {/* ── Header: show task context when editing ── */}
            <div className="modal-header" style={{ background: 'var(--surface2)' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {editing && (
                  <span style={{
                    display: 'inline-block', fontSize: 10, fontWeight: 700, letterSpacing: 1,
                    padding: '2px 8px', borderRadius: 20, marginBottom: 2,
                    background: (TYPE_META[editing.type] || TYPE_META.other).color, color: '#fff',
                  }}>
                    {(TYPE_META[editing.type] || TYPE_META.other).short}
                  </span>
                )}
                <div className="modal-title" style={{ fontSize: editing ? 18 : 24 }}>
                  {editing ? (editing.title || 'Edit task') : 'NEW TASK'}
                </div>
              </div>
              <button className="modal-close" onClick={closeForm}>×</button>
            </div>

            <div className="modal-body">
              {/* ── DETAILS section ── */}
              <div style={{ fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase', color: 'var(--text3)', fontFamily: "'DM Mono', monospace", paddingBottom: 8, borderBottom: '1px solid var(--border)', marginBottom: 14 }}>Details</div>
              <div className="form-grid">
                <div className="form-group full">
                  <label className="form-label">Title</label>
                  <input className="form-input" autoFocus placeholder="e.g. Bid — Westfield HS gym re-roof"
                         value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} />
                </div>

                {/* Type chips */}
                <div className="form-group full">
                  <label className="form-label">Type</label>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    {TASK_TYPES.map(t => (
                      <button
                        key={t.id}
                        onClick={() => setForm({ ...form, type: t.id })}
                        style={{
                          fontSize: 12, padding: '5px 14px', borderRadius: 20, cursor: 'pointer',
                          border: `2px solid ${form.type === t.id ? t.color : 'var(--border2)'}`,
                          background: form.type === t.id ? t.color + '22' : 'var(--surface2)',
                          color: form.type === t.id ? t.color : 'var(--text2)',
                          fontWeight: form.type === t.id ? 600 : 400,
                          transition: 'all 0.15s',
                        }}
                      >{t.label}</button>
                    ))}
                  </div>
                </div>

                {/* Due date */}
                <div className="form-group">
                  <label className="form-label">Due Date</label>
                  <div style={{ position: 'relative' }}>
                    <input type="date" className="form-input" value={form.dueDate ? form.dueDate.slice(0,10) : ''} onChange={e => setForm({ ...form, dueDate: e.target.value })} />
                    {form.dueDate && (() => {
                      const diff = Math.round((new Date(form.dueDate) - new Date(todayYMD)) / 86400000);
                      const label = diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : diff < 0 ? `${Math.abs(diff)}d overdue` : `${diff}d away`;
                      const color = diff < 0 ? 'var(--red)' : diff <= 3 ? '#d97706' : 'var(--text3)';
                      return <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', fontSize: 11, color, pointerEvents: 'none' }}>{label}</span>;
                    })()}
                  </div>
                </div>

                {/* Priority toggle */}
                <div className="form-group">
                  <label className="form-label">Priority</label>
                  <div style={{ display: 'flex', background: 'var(--surface2)', border: '1px solid var(--border2)', borderRadius: 8, overflow: 'hidden' }}>
                    {[['low','Low'],['normal','Normal'],['high','⚑ High']].map(([val, lbl]) => (
                      <button key={val} onClick={() => setForm({ ...form, priority: val })} style={{
                        flex: 1, border: 'none', cursor: 'pointer', padding: '7px 0', fontSize: 12, transition: 'all 0.15s',
                        background: form.priority === val ? (val === 'high' ? '#fee2e2' : val === 'normal' ? '#dbeafe' : 'var(--surface3)') : 'transparent',
                        color: form.priority === val ? (val === 'high' ? '#b91c1c' : val === 'normal' ? '#1d4ed8' : 'var(--text2)') : 'var(--text3)',
                        fontWeight: form.priority === val ? 600 : 400,
                      }}>{lbl}</button>
                    ))}
                  </div>
                </div>

                {/* Status strip */}
                <div className="form-group full">
                  <label className="form-label">Status</label>
                  <div style={{ display: 'flex', background: 'var(--surface2)', border: '1px solid var(--border2)', borderRadius: 8, overflow: 'hidden' }}>
                    {[['open','Open'],['done','✓ Done'],['cancelled','Cancelled']].map(([val, lbl]) => (
                      <button key={val} onClick={() => setForm({ ...form, status: val })} style={{
                        flex: 1, border: 'none', cursor: 'pointer', padding: '7px 0', fontSize: 12, transition: 'all 0.15s',
                        background: form.status === val ? (val === 'open' ? '#dcfce7' : val === 'done' ? '#dbeafe' : 'var(--surface3)') : 'transparent',
                        color: form.status === val ? (val === 'open' ? '#166534' : val === 'done' ? '#1d4ed8' : 'var(--text2)') : 'var(--text3)',
                        fontWeight: form.status === val ? 600 : 400,
                      }}>{lbl}</button>
                    ))}
                  </div>
                </div>

                <div className="form-group full">
                  <label className="form-label">Notes</label>
                  <textarea className="form-input" rows={3} placeholder="Location, scope, contact, notes..."
                    value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })}
                    style={{ resize: 'vertical', fontFamily: 'inherit' }} />
                </div>
              </div>

              {/* ── CONTEXT section ── */}
              <div style={{ fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase', color: 'var(--text3)', fontFamily: "'DM Mono', monospace", paddingBottom: 8, borderBottom: '1px solid var(--border)', margin: '20px 0 14px' }}>Context</div>
              <div className="form-grid">
                <div className="form-group">
                  <label className="form-label">Project type</label>
                  <select className="form-select" value={form.workType} onChange={e => setForm({ ...form, workType: e.target.value })}>
                    <option value="">— Select —</option>
                    {WORK_TYPES.map(w => <option key={w} value={w}>{w}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Client / Company</label>
                  <input className="form-input" placeholder="e.g. Turner Construction" value={form.client} onChange={e => setForm({ ...form, client: e.target.value })} />
                </div>
              </div>
            </div>

            <div className="modal-footer">
              {editing && <button className="btn btn-danger" onClick={() => remove(editing)} style={{ marginRight: 'auto' }}>Delete</button>}
              <button className="btn btn-ghost" onClick={closeForm}>Cancel</button>
              <button className="btn btn-primary" onClick={save}>{editing ? 'Save' : 'Create'} →</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── DASHBOARD ──
// ── SORTING (dashboard + contracts lists) ──
const SORT_OPTIONS_CONTRACTS = [
  { key: 'name', label: 'Name' }, { key: 'client', label: 'Client' }, { key: 'phase', label: 'Phase' },
  { key: 'contractValue', label: 'Contract value' }, { key: 'startDate', label: 'Start date' },
  { key: 'changeOrders', label: 'Change orders' }, { key: 'modified', label: 'Date modified' }, { key: 'created', label: 'Date created' },
];
const SORT_OPTIONS_DASHBOARD = [
  { key: 'name', label: 'Name' }, { key: 'client', label: 'Client' }, { key: 'phase', label: 'Phase' },
  { key: 'revenue', label: 'Revenue' }, { key: 'cost', label: 'Cost' }, { key: 'gross', label: 'Gross profit' },
  { key: 'margin', label: 'Margin' }, { key: 'modified', label: 'Date modified' }, { key: 'created', label: 'Date created' },
];
const sortValue = (p, key, calc) => {
  switch (key) {
    case 'client': return (p.client || '').toLowerCase();
    case 'phase': return PHASES.findIndex(ph => ph.id === p.phase);
    case 'contractValue': return p.contractValue || 0;
    case 'startDate': return p.startDate || '';
    case 'changeOrders': return (p.changeOrders || []).length;
    case 'modified': return p.updatedAt || p.createdAt || '';
    case 'created': return p.createdAt || '';
    case 'revenue': return calc ? calc.totalRevenue : 0;
    case 'cost': return calc ? calc.totalCost : 0;
    case 'gross': return calc ? calc.gross : 0;
    case 'margin': return calc ? calc.margin : 0;
    default: return (p.name || '').toLowerCase();
  }
};
function sortProjects(list, key, dir, calcs) {
  const arr = [...list];
  arr.sort((a, b) => {
    const ca = calcs && calcs.find(c => c.id === a.id);
    const cb = calcs && calcs.find(c => c.id === b.id);
    const va = sortValue(a, key, ca), vb = sortValue(b, key, cb);
    let cmp = (typeof va === 'string') ? va.localeCompare(vb) : (va - vb);
    if (cmp === 0) cmp = (a.name || '').localeCompare(b.name || '');
    return dir === 'asc' ? cmp : -cmp;
  });
  return arr;
}
function SortControl({ value, dir, onChange, onToggle, options }) {
  return (
    <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
      <span style={{ fontSize: 12, color: 'var(--text3)' }}>Sort</span>
      <select className="form-select" style={{ width: 'auto' }} value={value} onChange={e => onChange(e.target.value)}>
        {options.map(o => <option key={o.key} value={o.key}>{o.label}</option>)}
      </select>
      <button className="btn btn-ghost btn-sm" title={dir === 'asc' ? 'Ascending' : 'Descending'} onClick={onToggle}>{dir === 'asc' ? '↑ Asc' : '↓ Desc'}</button>
    </div>
  );
}

function Dashboard({ projects, employees, onSelectProject, refreshTick, onGoCalendar }) {
  const [tasks, setTasks] = useState([]);
  React.useEffect(() => { fetch('/api/tasks?status=open').then(r => r.json()).then(setTasks).catch(() => {}); }, [refreshTick]);
  const calcs = useMemo(() => projects.map(p => ({ ...calcProject(p, employees), id: p.id })), [projects, employees]);
  const [sortKey, setSortKey] = useState('name');
  const [sortDir, setSortDir] = useState('asc');
  const sortedProjects = useMemo(() => sortProjects(projects, sortKey, sortDir, calcs), [projects, sortKey, sortDir, calcs]);
  const totalRevenue = calcs.reduce((s, c) => s + c.totalRevenue, 0);
  const totalCost = calcs.reduce((s, c) => s + c.totalCost, 0);
  const totalGross = totalRevenue - totalCost;
  const activeJobs = projects.filter(p => p.phase !== 'closed').length;
  const pipelineCounts = Object.fromEntries(PHASES.map(p => [p.id, { count: 0, value: 0 }]));
  projects.forEach(p => {
    if (pipelineCounts[p.phase]) {
      const c = calcs.find(c => c.id === p.id);
      pipelineCounts[p.phase].count++;
      pipelineCounts[p.phase].value += c?.totalRevenue || 0;
    }
  });

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">DASHBOARD</div>
          <div className="page-subtitle">All contracts · financial overview</div>
        </div>
      </div>
      <div className="content">
        <div className="stats-grid">
          <div className="stat-card">
            <div className="stat-label">Total Revenue</div>
            <div className="stat-value">{fmt(totalRevenue)}</div>
            <div className="stat-sub">{projects.length} contracts tracked</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Total Costs</div>
            <div className="stat-value">{fmt(totalCost)}</div>
            <div className="stat-sub">Materials + Labor</div>
          </div>
          <div className={`stat-card ${totalGross >= 0 ? 'green' : 'red'}`}>
            <div className="stat-label">Gross Profit</div>
            <div className={`stat-value ${totalGross >= 0 ? 'td-green' : 'td-red'}`}>{fmtSigned(totalGross)}</div>
            <div className="stat-sub">Margin: {totalRevenue > 0 ? ((totalGross / totalRevenue) * 100).toFixed(1) : 0}%</div>
          </div>
          <div className="stat-card blue">
            <div className="stat-label">Active Jobs</div>
            <div className="stat-value">{activeJobs}</div>
            <div className="stat-sub">{projects.filter(p => p.phase === 'closed').length} closed</div>
          </div>
        </div>

        <div style={{ marginBottom: 8, fontSize: 11, letterSpacing: 2, color: 'var(--text3)', fontFamily: 'DM Mono', textTransform: 'uppercase' }}>Pipeline</div>
        <div className="pipeline-row">
          {PHASES.map(p => (
            <div key={p.id} className={`pipeline-stage s-${p.id}`}>
              <div className="ps-label">{p.label}</div>
              <div className="ps-count">{pipelineCounts[p.id]?.count || 0}</div>
              {pipelineCounts[p.id]?.value > 0 && <div className="ps-value">{fmt(pipelineCounts[p.id].value)}</div>}
            </div>
          ))}
        </div>

        {/* Upcoming deadlines */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, marginTop: 4 }}>
          <div style={{ fontSize: 11, letterSpacing: 2, color: 'var(--text3)', fontFamily: 'DM Mono', textTransform: 'uppercase' }}>Upcoming Deadlines</div>
          {onGoCalendar && <button className="btn btn-ghost btn-sm" onClick={onGoCalendar}>Open calendar →</button>}
        </div>
        <div className="table-wrap" style={{ marginBottom: 24 }}>
          {(() => {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const open = tasks.filter(t => t.status === 'open');
            const sorted = [...open.filter(t => t.dueDate).sort((a, b) => a.dueDate.localeCompare(b.dueDate)), ...open.filter(t => !t.dueDate)].slice(0, 5);
            if (sorted.length === 0) return <div className="empty-state"><div className="empty-state-sub">No open tasks. Add one in the Calendar tab, or ask the AI assistant.</div></div>;
            const relLabel = (ymd) => {
              const d = parseYMD(ymd); d.setHours(0, 0, 0, 0);
              const days = Math.round((d - today) / 86400000);
              if (days < 0) return { txt: `${-days}d overdue`, color: 'var(--red)' };
              if (days === 0) return { txt: 'today', color: 'var(--red)' };
              if (days === 1) return { txt: 'tomorrow', color: 'var(--text2)' };
              return { txt: `in ${days}d`, color: 'var(--text2)' };
            };
            return sorted.map(t => {
              const meta = TYPE_META[t.type] || TYPE_META.other;
              const rel = t.dueDate ? relLabel(t.dueDate.slice(0, 10)) : { txt: 'no date', color: 'var(--text3)' };
              return (
                <div key={t.id} className="agenda-item">
                  <span className="agenda-date">{t.dueDate ? fmtDate(t.dueDate) : '—'}</span>
                  <span className="badge-type" style={{ background: meta.color }}>{meta.short}</span>
                  <span style={{ flex: 1, fontWeight: 500 }}>
                    {t.priority === 'high' && <span style={{ color: 'var(--red)', marginRight: 6 }}>⚑</span>}
                    {t.title}
                    {t.client && <span style={{ color: 'var(--text3)', fontWeight: 400 }}> · {t.client}</span>}
                    {t.workType && <span style={{ color: 'var(--text3)', fontWeight: 400 }}> · {t.workType}</span>}
                  </span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: rel.color, fontFamily: 'DM Mono' }}>{rel.txt}</span>
                </div>
              );
            });
          })()}
        </div>

        {/* Top projects by margin */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, marginTop: 4 }}>
          <div style={{ fontSize: 11, letterSpacing: 2, color: 'var(--text3)', fontFamily: 'DM Mono', textTransform: 'uppercase' }}>Job Profitability</div>
          <SortControl value={sortKey} dir={sortDir} options={SORT_OPTIONS_DASHBOARD} onChange={setSortKey} onToggle={() => setSortDir(d => d === 'asc' ? 'desc' : 'asc')} />
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Project</th><th>Phase</th><th>Revenue</th><th>Costs</th><th>Gross Profit</th><th>Margin</th>
              </tr>
            </thead>
            <tbody>
              {sortedProjects.map(p => {
                const c = calcs.find(c => c.id === p.id);
                return (
                  <tr key={p.id} onClick={() => onSelectProject(p)}>
                    <td>
                      <div className="td-project">{p.name}</div>
                      <div className="td-client">{p.client}</div>
                    </td>
                    <td><PhaseBadge phase={p.phase} /></td>
                    <td className="td-mono">{fmt(c.totalRevenue)}</td>
