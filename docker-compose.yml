services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: apex-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /opt/apex-contracts/chroma:/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
      - ANONYMIZED_TELEMETRY=FALSE

  apex-contracts:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apex-contracts
    restart: unless-stopped
    depends_on:
      - chromadb
    ports:
      - "3009:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # ── AI provider: ollama (default, local/private) | anthropic | openai ──
      # All values below fall back to the defaults shown; override any of them in
      # a `.env` file next to this compose file (gitignored — safe for secrets).
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://13.0.2.47:11435}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-hf.co/bartowski/Qwen2.5-7B-Instruct-GGUF:Q5_K_M}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-8192}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      # ── Cloud fallback (only used when AI_PROVIDER is anthropic/openai) ──
      # Put real keys in .env, NOT here. Empty by default.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4-mini}
      - CHROMA_HOST=http://apex-chromadb:8000
      - CHROMA_COLLECTION=apex_docs
      - DB_PATH=/data/apex.db
      - UPLOAD_PATH=/data/uploads
      - RAG_TOP_K=5
      - RAG_CHUNK_SIZE=512
      - RAG_CHUNK_OVERLAP=64
      # Shared secret for the inbound-email → auto-task endpoint (empty = open).
      - INBOUND_EMAIL_TOKEN=${INBOUND_EMAIL_TOKEN:-}
    volumes:
      - /opt/apex-contracts/data:/data
      - ./frontend:/app/frontend:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  webhook:
    build:
      context: ./webhook
      dockerfile: Dockerfile
    container_name: apex-webhook
    restart: unless-stopped
    ports:
      - "9003:9000"
    environment:
      - WEBHOOK_SECRET=apex-deploy-secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/apex-contracts:/opt/apex-contracts
